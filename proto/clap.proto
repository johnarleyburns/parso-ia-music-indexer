syntax = "proto3";

package clap;

option go_package = "github.com/johnarleyburns/parso-ia-music-indexer/internal/clap/clap_proto";

// CLAPEmbedder defines the gRPC contract between the Go orchestrator
// and the Python neural inference sidecar.
service CLAPEmbedder {
  rpc GetEmbedding (EmbeddingRequest) returns (EmbeddingResponse);
  rpc GetTextEmbedding (TextEmbeddingRequest) returns (EmbeddingResponse);
}

message EmbeddingRequest {
  // Raw float32 PCM audio bytes, flat-packed in little-endian.
  bytes pcm_data = 1;
  // Sample rate of the audio. LAION-CLAP strictly requires 48000 Hz.
  int32 sample_rate = 2;
}

message EmbeddingResponse {
  repeated float embedding = 1;
}

message TextEmbeddingRequest {
  string text = 1;
}
